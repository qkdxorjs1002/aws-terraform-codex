    <rect x="654" y="216" width="118" height="34" rx="17" fill="#0E2A3D" stroke="#4BBCE0" stroke-opacity="0.65"/>
    <text x="688" y="239" fill="#A8E9FF" font-family="'Segoe UI', 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif" font-size="15" font-weight="600">
