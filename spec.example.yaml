project:
  name: "my-tst-tf"
  profile: "mzc"
  region: "ap-southeast-1"
  environment: "tst"
  managed_by: "terraform-codex"
  maintainer: "platform-team@example.com"

  resources:
    - iam_roles:
        - name: "my-tst-tf-eks-cls-iam-role"
          description: "IAM role for EKS control plane"
          assume_role_policy: '{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Principal":{"Service":"eks.amazonaws.com"},"Action":"sts:AssumeRole"}]}'
          policies:
            - "arn:aws:iam::aws:policy/AmazonEKSClusterPolicy"
        - name: "my-tst-tf-eks-nd-iam-role"
          description: "IAM role for EKS worker nodes"
          assume_role_policy: '{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Principal":{"Service":"ec2.amazonaws.com"},"Action":"sts:AssumeRole"}]}'
          policies:
            - "arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy"
            - "arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy"
            - "arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly"
        - name: "my-tst-tf-external-dns-pod-identity-role"
          description: "IAM role for EKS Pod Identity (external-dns)"
          assume_role_policy: '{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Principal":{"Service":"pods.eks.amazonaws.com"},"Action":["sts:AssumeRole","sts:TagSession"]}]}'
          policies:
            - "arn:aws:iam::aws:policy/AmazonRoute53ReadOnlyAccess"
            - "my-tst-tf-secrets-read-policy"
        - name: "my-tst-tf-github-deploy-role"
          description: "IAM role for GitHub Actions CodeDeploy"
          assume_role_policy: '{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Principal":{"Federated":"${oidc_provider[\"github-actions\"].arn}"},"Action":"sts:AssumeRoleWithWebIdentity","Condition":{"StringEquals":{"token.actions.githubusercontent.com:aud":"sts.amazonaws.com"},"StringLike":{"token.actions.githubusercontent.com:sub":"repo:my-org/my-repo:ref:refs/heads/main"}}}]}'
          policies:
            - "arn:aws:iam::aws:policy/service-role/AWSCodeDeployRole"
    - iam_policies:
        - name: "my-tst-tf-secrets-read-policy"
          description: "Customer managed policy for Secrets Manager read access"
          document_json: '{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Action":["secretsmanager:GetSecretValue","secretsmanager:DescribeSecret"],"Resource":"*"}]}'
    - iam_users:
        - name: "my-tst-tf-platform-automation-user"
          path: "/automation/"
          force_destroy: false
          policies:
            - "arn:aws:iam::aws:policy/ReadOnlyAccess"
            - "my-tst-tf-secrets-read-policy"
          inline_policies:
            - name: "allow-self-service-credentials"
              document_json: '{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Action":["iam:CreateAccessKey","iam:DeleteAccessKey","iam:ListAccessKeys","iam:UpdateAccessKey"],"Resource":"arn:aws:iam::*:user/my-tst-tf-platform-automation-user"}]}'
    - iam_oidc_providers:
        - name: "github-actions"
          url: "https://token.actions.githubusercontent.com"
          client_id_list:
            - "sts.amazonaws.com"
          thumbprint_list:
            - "6938fd4d98bab03faadb97b34396831e3780aea1"
    - ec2_launch_templates:
        - name: "my-tst-tf-eks-ap1-lt"
          version: "1"
          description: "Launch template for EKS node group my-tst-tf-eks-ng-ap1"
          instance_type: "m6i.2xlarge"
          security_groups:
            - "my-tst-tf-eks-cls-sg-ap1"
            - "${cluster[\"my-tst-tf-eks-ap1\"].security_group_id}"
          block_device_mappings:
            - device_name: "/dev/xvda"
              ebs:
                volume_size: 30
                volume_type: "gp3"
                encrypted: true
                delete_on_termination: true
        - name: "my-tst-tf-web-asg-lt"
          description: "Launch template for EC2 web auto scaling group"
          image_id: "ami-0123456789abcdef0"
          instance_type: "t3.medium"
          key_name: "my-tst-tf-key"
          vpc_security_groups:
            - "my-tst-tf-web-sg"
          metadata_options:
            http_tokens: "required"
            http_endpoint: "enabled"
            instance_metadata_tags: "enabled"
          tag_specifications:
            instance:
              Role: "web"
            volume:
              Role: "web"
    - vpcs:
        - name: "my-tst-tf-vpc-ap1"
          cidr: "10.80.0.0/16"
          additional_cidr_blocks:
            - "10.81.0.0/16"
          enable_dns_support: true
          enable_dns_hostnames: true
          instance_tenancy: "default"
          assign_generated_ipv6_cidr_block: false
    - subnets:
        - name: "my-tst-tf-sbn-pub-ap1a"
          vpc: "my-tst-tf-vpc-ap1"
          availability_zone: "ap-southeast-1a"
          cidr: "10.80.0.0/25"
          map_public_ip_on_launch: false
          assign_ipv6_address_on_creation: false
          tags:
            Tier: "public"

        - name: "my-tst-tf-sbn-pub-ap1c"
          vpc: "my-tst-tf-vpc-ap1"
          availability_zone: "ap-southeast-1c"
          cidr: "10.80.0.128/25"
          map_public_ip_on_launch: false
          assign_ipv6_address_on_creation: false
          tags:
            Tier: "public"

        - name: "my-tst-tf-sbn-pri-ap1a"
          vpc: "my-tst-tf-vpc-ap1"
          availability_zone: "ap-southeast-1a"
          cidr: "10.80.1.0/25"
          map_public_ip_on_launch: false
          assign_ipv6_address_on_creation: false
          tags:
            Tier: "private"

        - name: "my-tst-tf-sbn-pri-ap1c"
          vpc: "my-tst-tf-vpc-ap1"
          availability_zone: "ap-southeast-1c"
          cidr: "10.80.1.128/25"
          map_public_ip_on_launch: false
          assign_ipv6_address_on_creation: false
          tags:
            Tier: "private"

        - name: "my-tst-tf-sbn-pri-ap1a"
          vpc: "my-tst-tf-vpc-ap1"
          availability_zone: "ap-southeast-1a"
          cidr: "10.81.2.0/24"
          map_public_ip_on_launch: false
          assign_ipv6_address_on_creation: false
          tags:
            Tier: "private"

        - name: "my-tst-tf-sbn-pri-ap1c"
          vpc: "my-tst-tf-vpc-ap1"
          availability_zone: "ap-southeast-1c"
          cidr: "10.81.3.0/24"
          map_public_ip_on_launch: false
          assign_ipv6_address_on_creation: false
          tags:
            Tier: "private"

    - internet_gateways:
        - name: "my-tst-tf-igw-ap1"
          vpc: "my-tst-tf-vpc-ap1"
    - nat_gateways:
        - name: "my-tst-tf-nat-ap1a"
          vpc: "my-tst-tf-vpc-ap1"
          subnet: "my-tst-tf-sbn-pub-ap1a"
          connection_type: "public"
        - name: "my-tst-tf-nat-ap1c"
          vpc: "my-tst-tf-vpc-ap1"
          subnet: "my-tst-tf-sbn-pub-ap1c"
          connection_type: "public"
    - route_tables:
        - name: "my-tst-tf-rtb-pub-ap1"
          vpc: "my-tst-tf-vpc-ap1"
          associated_subnets:
            - "my-tst-tf-sbn-pub-ap1a"
            - "my-tst-tf-sbn-pub-ap1c"
          routes:
            - destination:
                type: "cidr"
                value: "0.0.0.0/0"
              target:
                type: "internet-gateway"
                value: "my-tst-tf-igw-ap1"
        - name: "my-tst-tf-rtb-pri-ap1a"
          vpc: "my-tst-tf-vpc-ap1"
          associated_subnets:
            - "my-tst-tf-sbn-pri-ap1a"
          routes:
            - destination:
                type: "cidr"
                value: "0.0.0.0/0"
              target:
                type: "nat-gateway"
                value: "my-tst-tf-nat-ap1a"
        - name: "my-tst-tf-rtb-pod-ap1a"
          vpc: "my-tst-tf-vpc-ap1"
          associated_subnets:
            - "my-tst-tf-sbn-pod-ap1a"
          routes:
            - destination:
                type: "cidr"
                value: "0.0.0.0/0"
              target:
                type: "nat-gateway"
                value: "my-tst-tf-nat-ap1c"
        - name: "my-tst-tf-rtb-pod-ap1c"
          vpc: "my-tst-tf-vpc-ap1"
          associated_subnets:
            - "my-tst-tf-sbn-pod-ap1c"
          routes:
            - destination:
                type: "cidr"
                value: "0.0.0.0/0"
              target:
                type: "nat-gateway"
                value: "my-tst-tf-nat-ap1c"
    - security_groups:
        - name: "my-tst-tf-eks-cls-sg-ap1"
          vpc: "my-tst-tf-vpc-ap1"
          revoke_rules_on_delete: false
          inbound_rules:
            - description: "Allow HTTPS from VPC"
              protocol: "tcp"
              port_range: 443
              source:
                type: "ip"
                value: "10.80.0.0/16"
            - description: "Allow HTTPS from EKS pod SG"
              protocol: "tcp"
              port_range: 443
              source:
                type: "security-group"
                value: "my-tst-tf-eks-pod-sg-ap1"
          outbound_rules:
            - description: "Allow HTTPS to EKS cluster SG"
              protocol: "tcp"
              port_range: 443
              destination:
                type: "security-group"
                value: "my-tst-tf-eks-cls-sg-ap1"
            - description: "Allow all outbound"
              protocol: "-1"
              port_range:
                from: 0
                to: 0
              destination:
                type: "ip"
                value: "0.0.0.0/0"
        - name: "my-tst-tf-eks-pod-sg-ap1"
          vpc: "my-tst-tf-vpc-ap1"
          revoke_rules_on_delete: false
          outbound_rules:
            - description: "Allow all outbound"
              protocol: "-1"
              port_range:
                from: 0
                to: 0
              destination:
                type: "ip"
                value: "0.0.0.0/0"
        - name: "my-tst-tf-web-sg"
          vpc: "my-tst-tf-vpc-ap1"
          revoke_rules_on_delete: false
          inbound_rules:
            - description: "Allow HTTP from internet"
              protocol: "tcp"
              port_range: 80
              source:
                type: "ip"
                value: "0.0.0.0/0"
          outbound_rules:
            - description: "Allow all outbound"
              protocol: "-1"
              port_range:
                from: 0
                to: 0
              destination:
                type: "ip"
                value: "0.0.0.0/0"
    - ec2_load_balancers:
        - name: "my-tst-tf-web-alb"
          vpc: "my-tst-tf-vpc-ap1"
          type: "application"
          subnets:
            - subnet: "my-tst-tf-sbn-pub-ap1a"
            - subnet: "my-tst-tf-sbn-pub-ap1c"
          security_groups:
            - "my-tst-tf-web-sg"
          scheme: "internet-facing"
          listeners:
            - protocol: "HTTP"
              port: 80
              target_groups:
                - "my-tst-tf-web-tg"
            - protocol: "HTTP"
              port: 81
              default_action:
                type: "fixed-response"
                fixed_response:
                  content_type: "text/plain"
                  status_code: "503"
                  message_body: "Service unavailable"
    - ec2_alb_target_groups:
        - name: "my-tst-tf-web-tg"
          type: "instance"
          vpc: "my-tst-tf-vpc-ap1"
          protocol: "HTTP"
          port: 80
          health_check:
            protocol: "HTTP"
            path: "/health"
            healthy_threshold: 3
            unhealthy_threshold: 2
            timeout_seconds: 5
            interval_seconds: 30
            success_codes: 200
    - ec2_auto_scaling_groups:
        - name: "my-tst-tf-web-asg"
          subnets:
            - "my-tst-tf-sbn-pri-ap1a"
            - "my-tst-tf-sbn-pri-ap1c"
          launch_template:
            name: "my-tst-tf-web-asg-lt"
            version: "$Latest"
          target_groups:
            - "my-tst-tf-web-tg"
          min_size: 2
          max_size: 4
          desired_capacity: 2
          health_check_type: "ELB"
          health_check_grace_period: 300
          termination_policies:
            - "OldestInstance"
          enabled_metrics:
            - "GroupDesiredCapacity"
            - "GroupInServiceInstances"
          instance_refresh:
            strategy: "Rolling"
            triggers:
              - "launch_template"
            preferences:
              min_healthy_percentage: 50
              instance_warmup: 300
    - codedeploy_applications:
        - name: "my-tst-tf-web-deploy"
          compute_platform: "Server"
    - codedeploy_deployment_groups:
        - name: "my-tst-tf-web-deploy-group"
          application: "my-tst-tf-web-deploy"
          service_role_name: "my-tst-tf-github-deploy-role"
          deployment_config_name: "CodeDeployDefault.OneAtATime"
          autoscaling_groups:
            - "my-tst-tf-web-asg"
          deployment_style:
            deployment_type: "IN_PLACE"
            deployment_option: "WITHOUT_TRAFFIC_CONTROL"
          auto_rollback_configuration:
            enabled: true
            events:
              - "DEPLOYMENT_FAILURE"
    - vpc_endpoints:
        - name: "my-tst-tf-vpce-ec2-ap1"
          vpc: "my-tst-tf-vpc-ap1"
          service: "com.amazonaws.ap-southeast-1.ec2"
          endpoint_type: "Interface"
          auto_accept: false
          private_dns_enabled: true
          subnets:
            - "my-tst-tf-sbn-pri-ap1a"
            - "my-tst-tf-sbn-pri-ap1c"
          security_groups:
            - "my-tst-tf-eks-cls-sg-ap1"
        - name: "my-tst-tf-vpce-ecr-api-ap1"
          vpc: "my-tst-tf-vpc-ap1"
          service: "com.amazonaws.ap-southeast-1.ecr.api"
          endpoint_type: "Interface"
          auto_accept: false
          private_dns_enabled: true
          subnets:
            - "my-tst-tf-sbn-pri-ap1a"
            - "my-tst-tf-sbn-pri-ap1c"
          security_groups:
            - "my-tst-tf-eks-cls-sg-ap1"
        - name: "my-tst-tf-vpce-ecr-dkr-ap1"
          vpc: "my-tst-tf-vpc-ap1"
          service: "com.amazonaws.ap-southeast-1.ecr.dkr"
          endpoint_type: "Interface"
          auto_accept: false
          private_dns_enabled: true
          subnets:
            - "my-tst-tf-sbn-pri-ap1a"
            - "my-tst-tf-sbn-pri-ap1c"
          security_groups:
            - "my-tst-tf-eks-cls-sg-ap1"
        - name: "my-tst-tf-vpce-sts-ap1"
          vpc: "my-tst-tf-vpc-ap1"
          service: "com.amazonaws.ap-southeast-1.sts"
          endpoint_type: "Interface"
          auto_accept: false
          private_dns_enabled: true
          subnets:
            - "my-tst-tf-sbn-pri-ap1a"
            - "my-tst-tf-sbn-pri-ap1c"
          security_groups:
            - "my-tst-tf-eks-cls-sg-ap1"
        - name: "my-tst-tf-vpce-logs-ap1"
          vpc: "my-tst-tf-vpc-ap1"
          service: "com.amazonaws.ap-southeast-1.logs"
          endpoint_type: "Interface"
          auto_accept: false
          private_dns_enabled: true
          subnets:
            - "my-tst-tf-sbn-pri-ap1a"
            - "my-tst-tf-sbn-pri-ap1c"
          security_groups:
            - "my-tst-tf-eks-cls-sg-ap1"
        - name: "my-tst-tf-vpce-s3-ap1"
          vpc: "my-tst-tf-vpc-ap1"
          service: "com.amazonaws.ap-southeast-1.s3"
          endpoint_type: "Gateway"
          auto_accept: false
          route_tables:
            - "my-tst-tf-rtb-pri-ap1a"
            - "my-tst-tf-rtb-pod-ap1a"
            - "my-tst-tf-rtb-pod-ap1c"
    - kms_keys:
        - alias: "alias/my-tst-tf-cmk-app"
          description: "Customer managed key for app encryption"
          enabled: true
          enable_key_rotation: true
          deletion_window_in_days: 30
          key_usage: "ENCRYPT_DECRYPT"
          key_spec: "SYMMETRIC_DEFAULT"
          multi_region: false
        - alias: "alias/my-tst-tf-existing-cmk"
          description: "Existing key imported by reference only"
          existing_key_id: "12345678-1234-1234-1234-123456789012"
          create_alias: false
    - eks_clusters:
        - name: "my-tst-tf-eks-ap1"
          vpc: "my-tst-tf-vpc-ap1"
          kubernetes_version: "1.35"
          endpoint_access:
            private: true
            public: true
            public_access_cidrs:
              - "0.0.0.0/0"
          subnet_names:
            - "my-tst-tf-sbn-pri-ap1a"
            - "my-tst-tf-sbn-pri-ap1c"
          security_group_names:
            - "my-tst-tf-eks-cls-sg-ap1"
          cluster_logging:
            enabled_types:
              - "api"
              - "audit"
              - "authenticator"
              - "controllerManager"
              - "scheduler"
            log_retention_days: 30
          iam:
            cluster_role_name: "my-tst-tf-eks-cls-iam-role"
    - eks_node_groups:
        - name: "my-tst-tf-eks-ng-ap1_1"
          cluster: "my-tst-tf-eks-ap1"
          subnet_names:
            - "my-tst-tf-sbn-pri-ap1a"
            - "my-tst-tf-sbn-pri-ap1c"
          iam_role_name: "my-tst-tf-eks-nd-iam-role"
          capacity_type: "ON_DEMAND"
          instance_types:
            - "t3.medium"
          scaling:
            desired_size: 1
            min_size: 0
            max_size: 1
          disk_size: 30
          disk_encryption: true
          launch_template:
            name: "my-tst-tf-eks-ap1-lt"
            version: "1"
    - eks_addons:
        - name: "coredns"
          cluster: "my-tst-tf-eks-ap1"
          version: "v1.13.2-eksbuild.4"
          provision_phase: "after_nodegroup"
          resolve_conflicts_on_create: "OVERWRITE"
          resolve_conflicts_on_update: "PRESERVE"
          service_account_role_arn: ""
          configuration_values: "{}"

        - name: "eks-pod-identity-agent"
          cluster: "my-tst-tf-eks-ap1"
          version: "v1.3.10-eksbuild.2"
          provision_phase: "before_nodegroup"
          resolve_conflicts_on_create: "OVERWRITE"
          resolve_conflicts_on_update: "PRESERVE"
          service_account_role_arn: ""
          configuration_values: "{}"

        - name: "kube-proxy"
          cluster: "my-tst-tf-eks-ap1"
          version: "v1.35.3-eksbuild.2"
          provision_phase: "before_nodegroup"
          resolve_conflicts_on_create: "OVERWRITE"
          resolve_conflicts_on_update: "PRESERVE"
          service_account_role_arn: ""
          configuration_values: "{}"

        - name: "vpc-cni"
          cluster: "my-tst-tf-eks-ap1"
          version: "v1.21.1-eksbuild.7"
          provision_phase: "before_nodegroup"
          resolve_conflicts_on_create: "OVERWRITE"
          resolve_conflicts_on_update: "PRESERVE"
          service_account_role_arn: ""
          configuration_values: |
            {
              "env": {
                  "AWS_VPC_K8S_CNI_CUSTOM_NETWORK_CFG": "true",
                  "ENABLE_PREFIX_DELEGATION": "true",
                  "WARM_ENI_TARGET": "1",
                  "WARM_IP_TARGET": "2",
                  "WARM_PREFIX_TARGET": "1",
                  "ENI_CONFIG_LABEL_DEF": "topology.kubernetes.io/zone"
              },
              "eniConfig": {
                  "create": true,
                  "region": "ap-southeast-1",
                  "subnets": {
                      "ap-southeast-1a": {
                          "id": "${subnet["my-tst-tf-sbn-pod-ap1a"]}",
                          "securityGroups": [
                              "${security_group["my-tst-tf-eks-pod-sg-ap1"]}"
                          ]
                      },
                      "ap-southeast-1c": {
                          "id": "${subnet["my-tst-tf-sbn-pod-ap1c"]}",
                          "securityGroups": [
                              "${security_group["my-tst-tf-eks-pod-sg-ap1"]}"
                          ]
                      }
                  }
              }
            }

    - eks_irsa_roles:
        - name: "my-tst-tf-albc-irsa-role"
          cluster: "my-tst-tf-eks-ap1"
          namespace: "kube-system"
          service_account_name: "aws-load-balancer-controller"
          managed_policies:
            - "arn:aws:iam::aws:policy/ElasticLoadBalancingFullAccess"
            - "arn:aws:iam::aws:policy/AmazonEC2ReadOnlyAccess"
        - name: "my-tst-tf-ca-irsa-role"
          cluster: "my-tst-tf-eks-ap1"
          namespace: "kube-system"
          service_account_name: "cluster-autoscaler"
          inline_policies:
            - name: "cluster-autoscaler"
              document_json: |
                {
                  "Version": "2012-10-17",
                  "Statement": [
                    {
                      "Effect": "Allow",
                      "Action": [
                        "autoscaling:DescribeAutoScalingGroups",
                        "autoscaling:DescribeAutoScalingInstances",
                        "autoscaling:DescribeLaunchConfigurations",
                        "autoscaling:DescribeScalingActivities",
                        "autoscaling:DescribeTags",
                        "ec2:DescribeImages",
                        "ec2:DescribeInstanceTypes",
                        "ec2:DescribeLaunchTemplateVersions",
                        "ec2:GetInstanceTypesFromInstanceRequirements",
                        "eks:DescribeNodegroup"
                      ],
                      "Resource": "*"
                    },
                    {
                      "Effect": "Allow",
                      "Action": [
                        "autoscaling:SetDesiredCapacity",
                        "autoscaling:TerminateInstanceInAutoScalingGroup"
                      ],
                      "Resource": "*",
                      "Condition": {
                        "StringEquals": {
                          "aws:ResourceTag/k8s.io/cluster-autoscaler/enabled": "true",
                          "aws:ResourceTag/k8s.io/cluster-autoscaler/my-tst-tf-eks-ap1": "owned"
                        }
                      }
                    }
                  ]
                }
    - eks_helm_releases:
        - name: "aws-load-balancer-controller"
          cluster: "my-tst-tf-eks-ap1"
          repository: "https://aws.github.io/eks-charts"
          chart: "aws-load-balancer-controller"
          namespace: "kube-system"
          create_namespace: false
          wait: true
          wait_for_jobs: true
          timeout: 600
          image_pull_policy: "IfNotPresent"
          set:
            - name: "clusterName"
              value: "${cluster_name}"
            - name: "region"
              value: "${region}"
            - name: "serviceAccount.create"
              value: "true"
            - name: "serviceAccount.name"
              value: "aws-load-balancer-controller"
            - name: "serviceAccount.annotations.eks\\.amazonaws\\.com/role-arn"
              value: '${iam_role["my-tst-tf-albc-irsa-role"]}'

        - name: "cluster-autoscaler"
          cluster: "my-tst-tf-eks-ap1"
          repository: "https://kubernetes.github.io/autoscaler"
          chart: "cluster-autoscaler"
          namespace: "kube-system"
          create_namespace: false
          wait: true
          wait_for_jobs: false
          timeout: 600
          image_pull_policy: "IfNotPresent"
          set:
            - name: "autoDiscovery.clusterName"
              value: "${cluster_name}"
            - name: "awsRegion"
              value: "${region}"
            - name: "rbac.serviceAccount.create"
              value: "true"
            - name: "rbac.serviceAccount.name"
              value: "cluster-autoscaler"
            - name: "rbac.serviceAccount.annotations.eks\\.amazonaws\\.com/role-arn"
              value: '${iam_role["my-tst-tf-ca-irsa-role"]}'

    - k8s_storage_classes:
        - name: "gp3"
          cluster: "my-tst-tf-eks-ap1"
          provisioner: "ebs.csi.aws.com"
          reclaim_policy: "Delete"
          volume_binding_mode: "WaitForFirstConsumer"
          allow_volume_expansion: true
          parameters:
            type: "gp3"
            fsType: "ext4"
          mount_options:
            - "discard"
          annotations:
            storageclass.kubernetes.io/is-default-class: "true"
          labels:
            app.kubernetes.io/managed-by: "terraform"

    - k8s_deployments:
        - name: "nginx-test"
          cluster: "my-tst-tf-eks-ap1"
          namespace: "default"
          replicas: 2
          selector_match_labels:
            app: "nginx-test"
          pod_labels:
            app: "nginx-test"
          containers:
            - name: "nginx"
              image: "nginx:stable"
              image_pull_policy: "IfNotPresent"
              ports:
                - name: "http"
                  container_port: 80
                  protocol: "TCP"

    - k8s_services:
        - name: "nginx-test"
          cluster: "my-tst-tf-eks-ap1"
          namespace: "default"
          type: "ClusterIP"
          selector:
            app: "nginx-test"
          ports:
            - name: "http"
              port: 80
              target_port: 80
              protocol: "TCP"

    - k8s_target_group_bindings:
        - name: "my-tst-tf-nginx-tgb"
          cluster: "my-tst-tf-eks-ap1"
          namespace: "default"
          service_name: "nginx-test"
          service_port: 80
          target_group_name: "my-tst-tf-nginx-tg"
          target_type: "ip"

    - eks_pod_identity_associations:
        - cluster: "my-tst-tf-eks-ap1"
          namespace: "kube-system"
          service_account_name: "external-dns"
          role_name: "my-tst-tf-external-dns-pod-identity-role"
